<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente de Codigo RC/PO</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --muted: #94a3b8;
      --text: #f8fafc;
      --primary: #22d3ee;
      --primary-strong: #06b6d4;
      --ok: #22c55e;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 920px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--muted);
      line-height: 1.45;
    }

    .panel {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
    }

    .step-tag {
      font-size: 0.85rem;
      color: var(--primary);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .question {
      font-size: 1.35rem;
      margin-bottom: 16px;
      line-height: 1.35;
    }

    .answers {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .answer-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .answer-btn:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
      background: #273449;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 2px;
    }

    .ghost-btn, .primary-btn {
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .ghost-btn {
      background: transparent;
      color: var(--text);
    }

    .ghost-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .primary-btn {
      background: var(--primary-strong);
      border-color: var(--primary-strong);
      color: #042f2e;
      font-weight: 700;
    }

    .path {
      margin-top: 18px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
      border-top: 1px dashed var(--border);
      padding-top: 14px;
    }

    .result {
      border: 1px solid rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .result h2 {
      color: var(--ok);
      margin-bottom: 10px;
      font-size: 1.25rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .result-item {
      background: rgba(17, 24, 39, 0.65);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .result-item strong {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Assistente de Codigo RC / PO</h1>
      <p>Responda as perguntas para chegar automaticamente ao codigo correto de Requisicao (RC) e Pedido de Compras (PO).</p>
    </header>

    <section class="panel">
      <div id="content"></div>
      <div id="path" class="path"></div>
    </section>
  </div>

  <script>
    const nodes = {
      contrato: {
        question: "Existe Contrato ou Acordo Comercial?",
        options: [
          { label: "Sim", next: "po-zcon" },
          { label: "Nao", next: "tipo-fluxo" }
        ]
      },
      "tipo-fluxo": {
        question: "RQ / PO / Transferencia?",
        options: [
          { label: "Pedido de Compras", next: "direto-indireto" },
          { label: "Transferencia", next: "po-ub" }
        ]
      },
      "direto-indireto": {
        question: "Direto ou Indireto?",
        options: [
          { label: "Direto", next: "znb-direto" },
          { label: "Indireto", next: "ordem-centro" }
        ]
      },
      "ordem-centro": {
        question: "Ordem ou Centro?",
        options: [
          { label: "Ordem", next: "area-manutencao" },
          { label: "Centro", next: "normal-emerg-centro" }
        ]
      },
      "area-manutencao": {
        question: "Area Manutencao?",
        options: [
          { label: "Sim", next: "normal-emerg-ordem-manut" },
          { label: "Nao", next: "normal-emerg-ordem-nao-manut" }
        ]
      },
      "normal-emerg-centro": {
        question: "Normal ou Emergencial?",
        options: [
          { label: "Normal", next: "zmpr-nb" },
          { label: "Emergencial", next: "zeme-zeme" }
        ]
      },
      "normal-emerg-ordem-manut": {
        question: "Normal ou Emergencial?",
        options: [
          { label: "Normal", next: "zapm-nb" },
          { label: "Emergencial", next: "zapm-zeme" }
        ]
      },
      "normal-emerg-ordem-nao-manut": {
        question: "Normal ou Emergencial?",
        options: [
          { label: "Normal", next: "zmcr-zcap" },
          { label: "Emergencial", next: "zcae-zcae" }
        ]
      },
      "po-zcon": {
        result: {
          tipo: "Pedido de Compras",
          descricao: "Contrato / Acordo Comercial",
          codigoRC: "-",
          codigoPO: "ZCON"
        }
      },
      "po-ub": {
        result: {
          tipo: "Transferencia",
          descricao: "Intercompany",
          codigoRC: "-",
          codigoPO: "UB"
        }
      },
      "znb-direto": {
        result: {
          tipo: "Requisicao de Compras",
          descricao: "Escala Peso",
          codigoRC: "ZNB",
          codigoPO: "ZNB"
        }
      },
      "zmpr-nb": {
        result: {
          tipo: "Requisicao de Compras",
          descricao: "Normal",
          codigoRC: "ZMPR",
          codigoPO: "NB"
        }
      },
      "zeme-zeme": {
        result: {
          tipo: "Requisicao de Compras",
          descricao: "Emergencial",
          codigoRC: "ZEME",
          codigoPO: "ZEME"
        }
      },
      "zapm-nb": {
        result: {
          tipo: "Requisicao de Compras",
          descricao: "Manutencao (Normal)",
          codigoRC: "ZAPM",
          codigoPO: "NB"
        }
      },
      "zapm-zeme": {
        result: {
          tipo: "Requisicao de Compras",
          descricao: "Manutencao (Emergencial)",
          codigoRC: "ZAPM",
          codigoPO: "ZEME"
        }
      },
      "zmcr-zcap": {
        result: {
          tipo: "Requisicao de Compras",
          descricao: "CAPEX Normal",
          codigoRC: "ZMCR",
          codigoPO: "ZCAP"
        }
      },
      "zcae-zcae": {
        result: {
          tipo: "Requisicao de Compras",
          descricao: "CAPEX Emergencial",
          codigoRC: "ZCAE",
          codigoPO: "ZCAE"
        }
      }
    };

    let currentNodeId = "contrato";
    const history = [];

    const contentEl = document.getElementById("content");
    const pathEl = document.getElementById("path");

    function render() {
      const node = nodes[currentNodeId];

      if (node.result) {
        contentEl.innerHTML = `
          <article class="result">
            <h2>Codigo encontrado</h2>
            <div class="result-grid">
              <div class="result-item"><strong>Tipo</strong>${node.result.tipo}</div>
              <div class="result-item"><strong>Descricao</strong>${node.result.descricao}</div>
              <div class="result-item"><strong>Codigo RC</strong>${node.result.codigoRC}</div>
              <div class="result-item"><strong>Codigo PO</strong>${node.result.codigoPO}</div>
            </div>
          </article>
          <div class="actions">
            <button class="ghost-btn" id="back-btn">Voltar</button>
            <button class="primary-btn" id="restart-btn">Reiniciar</button>
          </div>
        `;
      } else {
        const answersMarkup = node.options.map((option) => `
          <button class="answer-btn" data-next="${option.next}" data-label="${option.label}">
            ${option.label}
          </button>
        `).join("");

        contentEl.innerHTML = `
          <div class="step-tag">Etapa ${history.length + 1}</div>
          <h2 class="question">${node.question}</h2>
          <div class="answers">${answersMarkup}</div>
          <div class="actions">
            <button class="ghost-btn" id="back-btn" ${history.length === 0 ? "disabled" : ""}>Voltar</button>
            <button class="primary-btn" id="restart-btn">Reiniciar</button>
          </div>
        `;
      }

      attachEvents();
      renderPath();
    }

    function attachEvents() {
      const answerButtons = contentEl.querySelectorAll(".answer-btn");
      answerButtons.forEach((button) => {
        button.addEventListener("click", () => {
          history.push({
            nodeId: currentNodeId,
            question: nodes[currentNodeId].question,
            answer: button.dataset.label
          });
          currentNodeId = button.dataset.next;
          render();
        });
      });

      const backBtn = document.getElementById("back-btn");
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          if (history.length === 0) {
            return;
          }
          const previous = history.pop();
          currentNodeId = previous.nodeId;
          render();
        });
      }

      const restartBtn = document.getElementById("restart-btn");
      if (restartBtn) {
        restartBtn.addEventListener("click", () => {
          history.length = 0;
          currentNodeId = "contrato";
          render();
        });
      }
    }

    function renderPath() {
      if (history.length === 0) {
        pathEl.textContent = "Fluxo: nenhuma resposta ainda.";
        return;
      }

      const items = history.map((step) => `${step.question} -> ${step.answer}`);
      pathEl.innerHTML = `<strong>Fluxo escolhido:</strong><br>${items.join("<br>")}`;
    }

    render();
  </script>
</body>
</html>
